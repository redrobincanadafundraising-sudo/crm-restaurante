<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captains Log CRM - Painel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <!-- Tela de Login -->
    <div id="login-screen" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-lg shadow-md w-96">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Captains Log CRM</h2>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">E-mail</label>
                <input id="email" type="email" placeholder="jamie@redrobin.com" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">Senha</label>
                <input id="password" type="password" value="password123" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700 transition">Entrar</button>
        </div>
    </div>

    <!-- Dashboard Principal -->
    <div id="dashboard-screen" class="hidden min-h-screen flex">
        <!-- Sidebar -->
        <div class="w-64 bg-slate-800 text-white p-6 flex flex-col justify-between">
            <div>
                <h1 class="text-xl font-bold mb-8 tracking-wide">CAPTAINS LOG</h1>
                <nav class="space-y-3">
                    <a href="#" class="block py-2.5 px-4 rounded bg-slate-700 transition font-medium">📋 Pendências</a>
                    <a href="#" id="menu-stores" class="block py-2.5 px-4 rounded hover:bg-slate-700 transition opacity-50 pointer-events-none">🏪 Lojas (Central Only)</a>
                </nav>
            </div>
            <div>
                <p id="user-display" class="text-sm text-slate-400 mb-2"></p>
                <button onclick="handleLogout()" class="w-full bg-red-600 hover:bg-red-700 text-white py-1.5 px-3 rounded text-sm font-semibold transition">Sair</button>
            </div>
        </div>

        <!-- Conteúdo Principal -->
        <div class="flex-1 p-10 overflow-y-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-bold text-gray-800" id="panel-title">Lista de Pendências</h2>
                <button class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg font-medium shadow transition">+ Nova Pendência</button>
            </div>

            <!-- Cartões de Métricas -->
            <div id="metrics-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                    <p class="text-gray-500 text-sm font-semibold uppercase">Total Pendências</p>
                    <p id="count-total" class="text-3xl font-bold text-gray-800 mt-1">0</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                    <p class="text-red-500 text-sm font-semibold uppercase">Críticos (High)</p>
                    <p id="count-high" class="text-3xl font-bold text-red-600 mt-1">0</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                    <p class="text-green-500 text-sm font-semibold uppercase">Resolvidos</p>
                    <p id="count-resolved" class="text-3xl font-bold text-green-600 mt-1">0</p>
                </div>
            </div>

            <!-- Tabela de Dados -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200 text-gray-600 text-sm uppercase tracking-wider font-semibold">
                            <th class="p-4">ID</th>
                            <th class="p-4">Filial</th>
                            <th class="p-4">Categoria</th>
                            <th class="p-4">Título</th>
                            <th class="p-4">Prioridade</th>
                            <th class="p-4">Status</th>
                        </tr>
                    </thead>
                    <tbody id="tickets-table-body" class="divide-y divide-gray-100 text-gray-700">
                        <!-- Conteúdo alimentado pelo banco -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Lógica de Controle de Acesso -->
    <script>
        const API_URL = window.location.origin;

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const res = await fetch(`${API_URL}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('token', data.token);
                localStorage.setItem('role', data.role);
                localStorage.setItem('name', data.name);
                renderDashboard();
            } else {
                alert('Falha ao autenticar. Use a senha padrão "password123".');
            }
        }

        async function loadTickets() {
            const token = localStorage.getItem('token');
            const res = await fetch(`${API_URL}/api/tickets`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.ok) {
                const tickets = await res.json();
                const tbody = document.getElementById('tickets-table-body');
                tbody.innerHTML = '';

                document.getElementById('count-total').innerText = tickets.length;
                document.getElementById('count-high').innerText = tickets.filter(t => t.priority === 'High').length;
                document.getElementById('count-resolved').innerText = tickets.filter(t => t.status === 'Resolved').length;

                tickets.forEach(ticket => {
                    tbody.innerHTML += `
                        <tr class="hover:bg-gray-50 transition">
                            <td class="p-4 font-semibold text-gray-500">#${ticket.id}</td>
                            <td class="p-4 font-medium">${ticket.store_name}</td>
                            <td class="p-4"><span class="bg-gray-100 text-gray-800 text-xs px-2.5 py-1 rounded-full font-medium">${ticket.category}</span></td>
                            <td class="p-4">${ticket.title}</td>
                            <td class="p-4"><span class="text-sm font-bold ${ticket.priority === 'High' ? 'text-red-600' : 'text-amber-600'}">${ticket.priority}</span></td>
                            <td class="p-4"><span class="px-2 py-1 rounded text-xs font-bold ${ticket.status === 'Open' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}">${ticket.status}</span></td>
                        </tr>
                    `;
                });
            }
        }

        function renderDashboard() {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('role');
            const name = localStorage.getItem('name');

            if (!token) return;

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
            document.getElementById('user-display').innerText = `Logado como: ${name}`;

            if (role !== 'store_manager') {
                const storeMenu = document.getElementById('menu-stores');
                storeMenu.classList.remove('opacity-50', 'pointer-events-none');
                document.getElementById('panel-title').innerText = "Visão Geral Consolidadada (Central)";
            } else {
                document.getElementById('panel-title').innerText = "Pendências da Unidade";
            }

            loadTickets();
        }

        function handleLogout() {
            localStorage.clear();
            window.location.reload();
        }

        if (localStorage.getItem('token')) renderDashboard();
    </script>
</body>
</html>
